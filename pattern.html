<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>パターン登録＆ロック</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #status {
            font-size: 0.9rem;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        #message {
            font-size: 1.2rem;
            margin-bottom: 10px;
            height: 28px;
            text-align: center;
        }

        /* カウンター表示エリア */
        .counter-container {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            color: #aaaaaa;
        }
        .count-success { color: #4caf50; font-weight: bold; }
        .count-error { color: #f44336; font-weight: bold; }

        #timer-display {
            font-size: 1rem;
            color: #00ff66;
            font-family: monospace;
            margin-bottom: 15px;
            height: 20px;
        }

        #canvas-container {
            position: relative;
            width: 320px;
            height: 320px;
            transition: opacity 0.2s;
        }

        #canvas-container.locked {
            opacity: 0.3;
            pointer-events: none;
        }

        canvas {
            background-color: transparent;
            cursor: pointer;
        }

        /* コントロールボタン群 */
        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background: #333;
            color: white;
            transition: background 0.2s;
        }

        button:disabled {
            background: #1a1a1a;
            color: #555;
            cursor: not-allowed;
            border: 1px solid #222;
        }

        button.action-btn {
            background: #007bff;
            color: white;
        }

        button.restart-btn {
            background: #2e2a14;
            color: #ffd54f;
            border: 1px solid #ffd54f;
        }

        button.reset-count-btn {
            background: #2d1d1d;
            color: #ff5252;
            border: 1px solid #ff5252;
            padding: 6px 14px;
            font-size: 0.75rem;
        }

        .back-btn {
            display: inline-block;
            margin-top: 25px;
            color: #888;
            font-size: 14px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div id="status">パターン登録ステップ</div>
    <div id="message">新しいパターンを描いてください</div>

    <div class="counter-container">
        <div>成功: <span id="success-count" class="count-success">0</span> 回</div>
        <div>失敗: <span id="error-count" class="count-error">0</span> 回</div>
    </div>

    <div id="timer-display">タイム: 0.00 秒</div>
    
    <div id="canvas-container">
        <canvas id="lockCanvas" width="320" height="320"></canvas>
    </div>

    <div class="controls">
        <div class="btn-row">
            <button id="keepRestartBtn" class="restart-btn" onclick="restartInputOnly()">リスタート</button>
            <button id="actionBtn" class="action-btn" onclick="switchMode()" disabled>認証モードへ移行</button>
        </div>
        <button class="reset-count-btn" onclick="resetCounters()">カウントのみリセット</button>
    </div>

    <div>
        <a href="index.html" class="back-btn">メニューに戻る</a>
    </div>

    <script>
        const canvas = document.getElementById('lockCanvas');
        const canvasContainer = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const messageText = document.getElementById('message');
        const timerDisplay = document.getElementById('timer-display');
        const actionBtn = document.getElementById('actionBtn');
        const successCountText = document.getElementById('success-count');
        const errorCountText = document.getElementById('error-count');

        // 状態管理
        let isAuthMode = false;
        let canvasInputLocked = false;
        let savedPattern = [];
        let isSuccessState = false;

        // カウント用変数
        let successCount = 0;
        let errorCount = 0;

        // タイマー用変数
        let startTime = null;
        let timerInterval = null;
        let isTiming = false;

        const rows = 3;
        const cols = 3;
        const circles = [];
        let selectedCircles = [];
        let isDrawing = false;
        let currentPos = { x: 0, y: 0 };

        const spacingX = canvas.width / (cols + 1);
        const spacingY = canvas.height / (rows + 1);
        const radius = 12;
        const hitRadius = 25;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                circles.push({
                    id: r * cols + c,
                    x: spacingX * (c + 1),
                    y: spacingY * (r + 1)
                });
            }
        }

        // --- 初期化処理（ローカルストレージからの読み込み） ---
        function initApp() {
            // パターンの読込
            const localPattern = localStorage.getItem("savedPattern");
            if (localPattern) {
                try {
                    savedPattern = JSON.parse(localPattern);
                    if (Array.isArray(savedPattern) && savedPattern.length >= 3) {
                        isAuthMode = true;
                        statusText.innerText = "パターン認証モード実行中";
                        statusText.style.color = "#ffd54f";
                        messageText.style.color = "#ffffff";
                        messageText.innerText = "保存されたパターンがあります。入力して解除してください";
                        actionBtn.innerText = "登録からやり直す";
                        actionBtn.disabled = false;
                    } else {
                        savedPattern = [];
                    }
                } catch (e) {
                    savedPattern = [];
                }
            }

            if (savedPattern.length === 0) {
                statusText.innerText = "パターン登録ステップ";
                statusText.style.color = "#aaaaaa";
                messageText.style.color = "#ffffff";
                messageText.innerText = "新しいパターンを描いてください";
                actionBtn.innerText = "認証モードへ移行";
                actionBtn.disabled = true;
            }

            // カウントの読込
            successCount = parseInt(localStorage.getItem("pattern_successCount")) || 0;
            errorCount = parseInt(localStorage.getItem("pattern_errorCount")) || 0;
            updateCounterDisplay();

            resetTimerDisplay();
            draw();
        }

        function updateCounterDisplay() {
            successCountText.innerText = successCount;
            errorCountText.innerText = errorCount;
        }

        function resetCounters() {
            successCount = 0;
            errorCount = 0;
            localStorage.setItem("pattern_successCount", 0);
            localStorage.setItem("pattern_errorCount", 0);
            updateCounterDisplay();
            if (navigator.vibrate) navigator.vibrate(50);
        }

        // 描画
        function draw(isError = false) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (selectedCircles.length > 0) {
                ctx.beginPath();
                ctx.strokeStyle = isSuccessState ? '#4caf50' : (isError ? '#f44336' : (isAuthMode ? '#ffd54f' : '#00adb5'));
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                const firstCircle = circles[selectedCircles[0]];
                ctx.moveTo(firstCircle.x, firstCircle.y);

                for (let i = 1; i < selectedCircles.length; i++) {
                    const c = circles[selectedCircles[i]];
                    ctx.lineTo(c.x, c.y);
                }

                if (isDrawing) {
                    ctx.lineTo(currentPos.x, currentPos.y);
                }
                ctx.stroke();
            }

            circles.forEach(circle => {
                ctx.beginPath();
                ctx.arc(circle.x, circle.y, radius, 0, Math.PI * 2);
                
                if (selectedCircles.includes(circle.id)) {
                    ctx.fillStyle = isSuccessState ? '#4caf50' : (isError ? '#f44336' : (isAuthMode ? '#ffd54f' : '#00adb5'));
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(circle.x, circle.y, radius + 8, 0, Math.PI * 2);
                    ctx.strokeStyle = isSuccessState ? 'rgba(76, 175, 80, 0.3)' : (isError ? 'rgba(244, 67, 54, 0.3)' : (isAuthMode ? 'rgba(255, 213, 79, 0.3)' : 'rgba(0, 173, 181, 0.3)'));
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = '#555555';
                    ctx.fill();
                }
            });
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function checkCollision(pos) {
            for (let circle of circles) {
                const dist = Math.hypot(circle.x - pos.x, circle.y - pos.y);
                if (dist < hitRadius) {
                    if (!selectedCircles.includes(circle.id)) {
                        selectedCircles.push(circle.id);
                        if (navigator.vibrate) navigator.vibrate(15);
                    }
                    break;
                }
            }
        }

        function startTimer() {
            isTiming = true;
            startTime = performance.now();
            timerInterval = setInterval(() => {
                const elapsedTime = (performance.now() - startTime) / 1000;
                timerDisplay.innerHTML = `タイム: ${elapsedTime.toFixed(2)} 秒`;
            }, 50);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            isTiming = false;
        }

        function resetTimerDisplay() {
            stopTimer();
            timerDisplay.innerHTML = "タイム: 0.00 秒";
            timerDisplay.style.color = "#00ff66";
        }

        function startHandler(e) {
            if (canvasContainer.classList.contains('locked') || canvasInputLocked) return;
            e.preventDefault();
            
            if (!isTiming) {
                startTimer();
                timerDisplay.style.color = "#00ff66";
            }

            isDrawing = true;
            selectedCircles = [];
            currentPos = getMousePos(e);
            checkCollision(currentPos);
            draw();
        }

        function moveHandler(e) {
            if (!isDrawing || canvasInputLocked) return;
            e.preventDefault();
            currentPos = getMousePos(e);
            checkCollision(currentPos);
            draw();
        }

        function endHandler(e) {
            if (!isDrawing) return;
            isDrawing = false;

            stopTimer();
            const finalTime = ((performance.now() - startTime) / 1000).toFixed(2);

            if (selectedCircles.length < 3) {
                canvasInputLocked = true;
                canvasContainer.classList.add('locked');
                timerDisplay.innerHTML = `判定タイム: ${finalTime} 秒 (無効)`;
                timerDisplay.style.color = '#f44336';
                showError("3つ以上の点をつないてください。リスタートしてください");
                return;
            }

            canvasInputLocked = true;
            canvasContainer.classList.add('locked');

            if (!isAuthMode) {
                savedPattern = [...selectedCircles];
                localStorage.setItem("savedPattern", JSON.stringify(savedPattern));

                timerDisplay.innerHTML = `登録タイム: ${finalTime} 秒`;
                messageText.innerHTML = `パターン登録完了！「認証モードへ移行」を押してください。`;
                actionBtn.disabled = false;
            } else {
                if (JSON.stringify(selectedCircles) === JSON.stringify(savedPattern)) {
                    isSuccessState = true;
                    statusText.innerText = "認証成功 / ACCESS GRANTED";
                    statusText.style.color = "#4caf50";
                    messageText.style.color = '#4caf50';
                    messageText.innerText = "パターン一致！リスタートで再挑戦できます";
                    
                    timerDisplay.innerHTML = `突破タイム: ${finalTime} 秒！`;
                    timerDisplay.style.color = '#4caf50';
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
                    
                    // 成功数カウントアップ
                    successCount++;
                    localStorage.setItem("pattern_successCount", successCount);
                    draw();
                } else {
                    statusText.innerText = "認証失敗 / ACCESS DENIED";
                    statusText.style.color = "#f44336";
                    messageText.style.color = '#f44336';
                    messageText.innerText = "パターンが違います。リスタートしてください";
                    
                    timerDisplay.innerHTML = `失敗タイム: ${finalTime} 秒`;
                    timerDisplay.style.color = '#f44336';
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                    
                    // 失敗数カウントアップ
                    errorCount++;
                    localStorage.setItem("pattern_errorCount", errorCount);
                    draw(true);
                }
                updateCounterDisplay();
            }
        }

        function showError(msg) {
            messageText.style.color = '#f44336';
            messageText.innerText = msg;
            draw(true);
        }

        function restartInputOnly() {
            canvasInputLocked = false;
            canvasContainer.classList.remove('locked');
            isSuccessState = false;
            selectedCircles = [];
            resetTimerDisplay();
            draw();

            if (isAuthMode) {
                statusText.innerText = "パターン認証モード実行中";
                statusText.style.color = "#ffd54f";
                messageText.style.color = "#ffffff";
                messageText.innerText = "登録データを維持してリスタートしました。";
            } else {
                savedPattern = [];
                localStorage.removeItem("savedPattern");

                statusText.innerText = "パターン登録ステップ";
                statusText.style.color = "#aaaaaa";
                messageText.style.color = "#ffffff";
                messageText.innerText = "新しいパターンを描いてください";
                actionBtn.disabled = true;
                actionBtn.innerText = "認証モードへ移行";
            }
        }

        function switchMode() {
            resetTimerDisplay();
            canvasInputLocked = false;
            canvasContainer.classList.remove('locked');
            isSuccessState = false;
            selectedCircles = [];
            draw();

            if (!isAuthMode) {
                isAuthMode = true;
                statusText.innerText = "パターン認証モード実行中";
                statusText.style.color = "#ffd54f";
                messageText.style.color = "#ffffff";
                messageText.innerText = "登録したパターンを入力して解除してください";
                actionBtn.innerText = "登録からやり直す";
            } else {
                isAuthMode = false;
                savedPattern = [];
                localStorage.removeItem("savedPattern");

                statusText.innerText = "パターン登録ステップ";
                statusText.style.color = "#aaaaaa";
                messageText.style.color = "#ffffff";
                messageText.innerText = "新しいパターンを描いてください";
                actionBtn.innerText = "認証モードへ移行";
                actionBtn.disabled = true;
            }
        }

        canvas.addEventListener('mousedown', startHandler);
        window.addEventListener('mousemove', moveHandler);
        window.addEventListener('mouseup', endHandler);
        canvas.addEventListener('touchstart', startHandler, { passive: false });
        window.addEventListener('touchmove', moveHandler, { passive: false });
        window.addEventListener('touchend', endHandler);

        initApp();
    </script>
</body>
</html>
