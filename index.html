<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ロック画面セレクター</title>
    <style>
        body {
            margin: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .title { font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; }
        .subtitle { font-size: 1rem; color: #888; margin-bottom: 50px; }
        
        .menu-btn {
            width: 240px;
            padding: 18px;
            margin: 12px 0;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            background-color: #1c1c1e;
            border: 2px solid #3a3a3c;
            border-radius: 12px;
            text-align: center;
            text-decoration: none; /* リンクの下線を消す */
            display: block;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .menu-btn:active {
            background-color: #3a3a3c;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="title">LOCK SCREEN</div>
    <div class="subtitle">認証タイプを選択してください</div>

    <a href="pattern.html" class="menu-btn">パターンロック</a>
    <a href="pin.html" class="menu-btn">数字パスコード</a>
    <a href="challenge.html" class="menu-btn">図形パスコード</a>

</body>
</html>
