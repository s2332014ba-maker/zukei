<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スマホ風 パスコードロック</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #status {
            font-size: 0.8rem;
            color: #888888;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        /* ★高さを自動調整にし、2行になっても被らないように修正 */
        #message {
            font-size: 1.1rem;
            margin-bottom: 12px;
            min-height: 24px;
            height: auto;
            text-align: center;
            max-width: 90%;
            line-height: 1.4;
        }

        /* ★余白を微調整 */
        #timer-display {
            font-size: 0.95rem;
            color: #00ff66;
            font-family: monospace;
            margin-bottom: 10px;
            height: 20px;
        }

        /* ★位置を下げたカウンターのスタイル調整 */
        .counter-container {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            margin-bottom: 20px; 
            color: #aaaaaa;
        }
        .count-success { color: #4caf50; font-weight: bold; }
        .count-error { color: #f44336; font-weight: bold; }

        /* 入力中のドット表示 */
        .dots-container {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
            height: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            transition: background-color 0.1s ease;
        }

        .dot.filled {
            background-color: #ffffff;
        }

        /* キーパッド */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px 25px; /* スマホ向けに縦の隙間を少し詰めました */
            width: 280px;
            transition: opacity 0.2s;
        }

        /* ロック中（入力禁止時）のスタイル */
        .keypad.locked {
            opacity: 0.3;
            pointer-events: none;
        }

        .key {
            width: 72px;  /* わずかに縮小 */
            height: 72px; /* わずかに縮小 */
            border-radius: 50%;
            background-color: #1c1c1e;
            color: #ffffff;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.1s;
        }

        .key:active {
            background-color: #3a3a3c;
        }

        /* 特殊ボタン（文字や機能） */
        .key.text-key {
            background-color: transparent;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .key.text-key:active {
            background-color: transparent;
            opacity: 0.5;
        }

        /* コントロールボタン群（3つ横並び） */
        .controls {
            margin-top: 25px;
            width: 320px;
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 10px 4px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: #1c1c1e;
            color: white;
            transition: background 0.2s;
            white-space: nowrap;
            text-align: center;
        }

        button:disabled {
            background: #111;
            color: #444;
            cursor: not-allowed;
            border: 1px solid #222;
        }

        button.action-btn {
            background: #007bff;
            color: white;
        }

        button.restart-btn {
            background: #2e2a14;
            color: #ffd54f;
            border: 1px solid #ffd54f;
        }

        button.reset-count-btn {
            background: #2c1a1a;
            color: #ff5252;
            border: 1px solid #ff5252;
        }

        /* メメニューに戻るの位置 */
        .back-container {
            margin-top: 20px;
            text-align: center;
        }

        .back-btn {
            display: inline-block;
            color: #888;
            font-size: 14px;
            text-decoration: none;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

    <div id="status">パスコード登録ステップ</div>
    <div id="message">新しいパスコードを入力 (0/5)</div>
    
    <div id="timer-display">タイム: 0.00 秒</div>

    <div class="counter-container">
        <div>成功: <span id="success-count" class="count-success">0</span> 回</div>
        <div>失敗: <span id="error-count" class="count-error">0</span> 回</div>
    </div>

    <div class="dots-container">
        <div class="dot" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
        <div class="dot" id="dot4"></div>
    </div>

    <div class="keypad" id="keypad">
        <div class="key" onclick="pressKey('1')">1</div>
        <div class="key" onclick="pressKey('2')">2</div>
        <div class="key" onclick="pressKey('3')">3</div>
        <div class="key" onclick="pressKey('4')">4</div>
        <div class="key" onclick="pressKey('5')">5</div>
        <div class="key" onclick="pressKey('6')">6</div>
        <div class="key" onclick="pressKey('7')">7</div>
        <div class="key" onclick="pressKey('8')">8</div>
        <div class="key" onclick="pressKey('9')">9</div>
        <div class="key text-key" id="left-key"></div> 
        <div class="key" onclick="pressKey('0')">0</div>
        <div class="key text-key" onclick="pressDelete()">削除</div>
    </div>

    <div class="controls">
        <div class="btn-row">
            <button id="keepRestartBtn" class="restart-btn" onclick="restartInputOnly()">リスタート</button>
            <button id="actionBtn" class="action-btn" onclick="switchMode()" disabled>認証モードへ移行</button>
            <button class="reset-count-btn" onclick="resetCounters()">カウントリセット</button>
        </div>
    </div>

    <div class="back-container">
        <a href="index.html" class="back-btn">メニューに戻る</a>
    </div>

    <script>
        const statusText = document.getElementById('status');
        const messageText = document.getElementById('message');
        const timerDisplay = document.getElementById('timer-display');
        const keypad = document.getElementById('keypad');
        const actionBtn = document.getElementById('actionBtn');
        const successCountText = document.getElementById('success-count');
        const errorCountText = document.getElementById('error-count');
        
        let isAuthMode = false;
        let currentInput = '';
        let savedPassword = '';

        let successCount = 0;
        let errorCount = 0;

        let startTime = null;
        let timerInterval = null;
        let isTiming = false;

        const MAX_LENGTH = 5; 

        // --- 初期化処理 ---
        function initApp() {
            const localPassword = localStorage.getItem("savedPassword");
            if (localPassword && localPassword.length === MAX_LENGTH) {
                savedPassword = localPassword;
                isAuthMode = true;
                statusText.innerText = "パスコード認証モード実行中";
                statusText.style.color = "#ffca28";
                messageText.style.color = "#ffffff";
                messageText.innerText = "保存されたパスコードがあります。入力して解除してください。";
                actionBtn.innerText = "登録からやり直す";
                actionBtn.disabled = false;
            } else {
                statusText.innerText = "パスコード登録ステップ";
                statusText.style.color = "#888888";
                messageText.style.color = "#ffffff";
                messageText.innerText = "新しいパスコードを入力 (0/5)";
                actionBtn.innerText = "認証モードへ移行";
                actionBtn.disabled = true;
            }

            successCount = parseInt(localStorage.getItem("pass_successCount")) || 0;
            errorCount = parseInt(localStorage.getItem("pass_errorCount")) || 0;
            updateCounterDisplay();

            resetTimerDisplay();
            updateDots();
        }

        function updateCounterDisplay() {
            successCountText.innerText = successCount;
            errorCountText.innerText = errorCount;
        }

        function resetCounters() {
            successCount = 0;
            errorCount = 0;
            localStorage.setItem("pass_successCount", 0);
            localStorage.setItem("pass_errorCount", 0);
            updateCounterDisplay();
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function startTimer() {
            isTiming = true;
            startTime = performance.now();
            timerInterval = setInterval(() => {
                const elapsedTime = (performance.now() - startTime) / 1000;
                timerDisplay.innerHTML = `タイム: ${elapsedTime.toFixed(2)} 秒`;
            }, 50);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            isTiming = false;
        }

        function resetTimerDisplay() {
            stopTimer();
            timerDisplay.innerHTML = "タイム: 0.00 秒";
            timerDisplay.style.color = "#00ff66";
        }

        function pressKey(num) {
            if (currentInput.length >= MAX_LENGTH || keypad.classList.contains('locked')) return;
            if (messageText.style.color === 'rgb(244, 67, 54)' || messageText.style.color === 'rgb(76, 175, 80)') return; 
            
            if (!isTiming && currentInput.length === 0) {
                startTimer();
                timerDisplay.style.color = "#00ff66";
            }

            currentInput += num;
            updateDots();
            
            if (!isAuthMode) {
                messageText.innerText = `新しいパスコードを入力 (${currentInput.length}/${MAX_LENGTH})`;
            }

            if (navigator.vibrate) navigator.vibrate(15); 

            if (currentInput.length === MAX_LENGTH) {
                stopTimer();
                setTimeout(handleInputComplete, 200);
            }
        }

        function pressDelete() {
            if (keypad.classList.contains('locked')) return;
            if (messageText.style.color === 'rgb(244, 67, 54)' || messageText.style.color === 'rgb(76, 175, 80)') return; 
            
            if (currentInput.length > 0) {
                currentInput = currentInput.slice(0, -1);
                updateDots();
                
                if (!isAuthMode) {
                    messageText.innerText = currentInput.length > 0 ? `新しいパスコードを入力 (${currentInput.length}/${MAX_LENGTH})` : `新しいパスコードを入力 (0/5)`;
                }

                if (currentInput.length === 0) {
                    resetTimerDisplay();
                }
            }
        }

        function updateDots() {
            for (let i = 0; i < MAX_LENGTH; i++) {
                const dot = document.getElementById(`dot${i}`);
                if (i < currentInput.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            }
        }

        function handleInputComplete() {
            const finalTime = ((performance.now() - startTime) / 1000).toFixed(2);

            if (!isAuthMode) {
                savedPassword = currentInput;
                keypad.classList.add('locked');
                localStorage.setItem("savedPassword", savedPassword);
                
                timerDisplay.innerHTML = `登録タイム: ${finalTime} 秒`;
                messageText.innerHTML = `パスコード登録完了！「認証モードへ移行」を押してください。`;
                actionBtn.disabled = false;
                
            } else {
                keypad.classList.add('locked');

                if (currentInput === savedPassword) {
                    statusText.innerText = "認証成功 / ACCESS GRANTED";
                    statusText.style.color = "#4caf50";
                    messageText.style.color = '#4caf50';
                    messageText.innerText = "パスコード一致！リスタートで再挑戦できます";
                    
                    timerDisplay.innerHTML = `突破タイム: ${finalTime} 秒！`;
                    timerDisplay.style.color = '#4caf50';
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);

                    successCount++;
                    localStorage.setItem("pass_successCount", successCount);

                } else {
                    statusText.innerText = "認証失敗 / ACCESS DENIED";
                    statusText.style.color = "#f44336";
                    messageText.style.color = '#f44336';
                    messageText.innerText = "コードが違います。リスタートしてください";
                    
                    timerDisplay.innerHTML = `失敗タイム: ${finalTime} 秒`;
                    timerDisplay.style.color = '#f44336';
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);

                    errorCount++;
                    localStorage.setItem("pass_errorCount", errorCount);
                }
                updateCounterDisplay();
            }
            currentInput = '';
        }

        function restartInputOnly() {
            keypad.classList.remove('locked');
            currentInput = '';
            updateDots();
            resetTimerDisplay();

            if (isAuthMode) {
                statusText.innerText = "パスコード認証モード実行中";
                statusText.style.color = "#ffca28";
                messageText.style.color = "#ffffff";
                messageText.innerText = "登録データを維持してリスタートしました。";
            } else {
                savedPassword = '';
                localStorage.removeItem("savedPassword");

                statusText.innerText = "パスコード登録ステップ";
                statusText.style.color = "#888888";
                messageText.style.color = "#ffffff";
                messageText.innerText = "新しいパスコードを入力 (0/5)";
                actionBtn.disabled = true;
                actionBtn.innerText = "認証モードへ移行";
            }
            if (navigator.vibrate) navigator.vibrate(100);
        }

        function switchMode() {
            resetTimerDisplay();
            keypad.classList.remove('locked');
            currentInput = '';
            updateDots();

            if (!isAuthMode) {
                isAuthMode = true;
                statusText.innerText = "パスコード認証モード実行中";
                statusText.style.color = "#ffca28";
                messageText.style.color = "#ffffff";
                messageText.innerText = "登録したパスコードを入力して解除してください";
                actionBtn.innerText = "登録からやり直す";
            } else {
                isAuthMode = false;
                savedPassword = '';
                localStorage.removeItem("savedPassword");

                statusText.innerText = "パスコード登録ステップ";
                statusText.style.color = "#888888";
                messageText.style.color = "#ffffff";
                messageText.innerText = "新しいパスコードを入力 (0/5)";
                actionBtn.innerText = "認証モードへ移行";
                actionBtn.disabled = true;
            }
        }

        initApp();
    </script>
</body>
</html>
