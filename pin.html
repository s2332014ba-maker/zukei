<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スマホ風 パスコードロック</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #status {
            font-size: 0.8rem;
            color: #888888;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        #message {
            font-size: 1.2rem;
            margin-bottom: 30px;
            height: 24px;
            text-align: center;
        }

        /* 入力中のドット表示 */
        .dots-container {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
            height: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            transition: background-color 0.1s ease;
        }

        .dot.filled {
            background-color: #ffffff;
        }

        /* キーパッド */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px 25px;
            width: 280px;
        }

        .key {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #1c1c1e;
            color: #ffffff;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.1s;
        }

        .key:active {
            background-color: #3a3a3c;
        }

        /* 特殊ボタン（文字や機能） */
        .key.text-key {
            background-color: transparent;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .key.text-key:active {
            background-color: transparent;
            opacity: 0.5;
        }

        /* リセットボタン */
        #reset-btn {
            margin-top: 40px;
            padding: 8px 16px;
            background-color: #1c1c1e;
            color: #888888;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .back-btn {
            display: inline-block;
            margin-top: 25px;
            color: #888;
            font-size: 14px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div id="status">STEP 1: 登録</div>
    <div id="message">新しいパスコードを入力</div>

    <div class="dots-container">
        <div class="dot" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
        <div class="dot" id="dot4"></div>
    </div>

    <div class="keypad">
        <div class="key" onclick="pressKey('1')">1</div>
        <div class="key" onclick="pressKey('2')">2</div>
        <div class="key" onclick="pressKey('3')">3</div>
        <div class="key" onclick="pressKey('4')">4</div>
        <div class="key" onclick="pressKey('5')">5</div>
        <div class="key" onclick="pressKey('6')">6</div>
        <div class="key" onclick="pressKey('7')">7</div>
        <div class="key" onclick="pressKey('8')">8</div>
        <div class="key" onclick="pressKey('9')">9</div>
        <div class="key text-key" id="left-key"></div> <div class="key" onclick="pressKey('0')">0</div>
        <div class="key text-key" onclick="pressDelete()">削除</div>
    </div>

    <button id="reset-btn" onclick="resetAll()">最初から登録し直す</button>

    <div>
        <a href="index.html" class="back-btn">メニューに戻る</a>
    </div>

    <script>
        const statusText = document.getElementById('status');
        const messageText = document.getElementById('message');
        
        // 状態管理: 'REGISTER_1' (1回目), 'REGISTER_2' (確認), 'LOCKED' (ロック中)
        let currentState = 'REGISTER_1';
        let currentInput = '';
        let firstInputPassword = '';
        let savedPassword = '';

        const MAX_LENGTH = 5; // 桁数（ここを6に変えれば6桁化も可能 ※HTMLのdotも増やす必要あり）

        // 数字が押されたとき
        function pressKey(num) {
            if (currentInput.length >= MAX_LENGTH) return;
            
            currentInput += num;
            updateDots();
            if (navigator.vibrate) navigator.vibrate(15); // タップバイブ

            // 4桁入力されたら判定へ
            if (currentInput.length === MAX_LENGTH) {
                // ほんの少しディレイを設けて丸が黒く染まったのを見せる
                setTimeout(handleInputComplete, 200);
            }
        }

        // 「削除」が押されたとき
        function pressDelete() {
            if (currentInput.length > 0) {
                currentInput = currentInput.slice(0, -1);
                updateDots();
            }
        }

        // 画面の丸（ドット）の表示を更新
        function updateDots() {
            for (let i = 0; i < MAX_LENGTH; i++) {
                const dot = document.getElementById(`dot${i}`);
                if (i < currentInput.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            }
        }

        // 4桁入力が完了した時の処理
        function handleInputComplete() {
            if (currentState === 'REGISTER_1') {
                // 1回目の登録
                firstInputPassword = currentInput;
                currentState = 'REGISTER_2';
                statusText.innerText = "STEP 2: 確認";
                messageText.innerText = "確認のためもう一度入力";
                
            } else if (currentState === 'REGISTER_2') {
                // 2回目の確認
                if (currentInput === firstInputPassword) {
                    savedPassword = currentInput;
                    currentState = 'LOCKED';
                    statusText.innerText = "STATUS: ロック中";
                    messageText.style.color = '#4caf50';
                    messageText.innerText = "登録完了！画面をロックしました";
                    
                    setTimeout(() => {
                        messageText.style.color = '#ffffff';
                        messageText.innerText = "パスコードを入力して解除";
                    }, 1500);
                } else {
                    showError("パスコードが一致しません");
                    currentState = 'REGISTER_1';
                    statusText.innerText = "STEP 1: 登録";
                }
                
            } else if (currentState === 'LOCKED') {
                // ロック解除モード
                if (currentInput === savedPassword) {
                    messageText.style.color = '#4caf50';
                    messageText.innerText = "ロック解除成功！";
                } else {
                    showError("コードが違います");
                }
            }

            // 入力をクリアしてドットを戻す
            currentInput = '';
            updateDots();
        }

        // エラーメッセージの一時表示
        function showError(msg) {
            messageText.style.color = '#f44336';
            messageText.innerText = msg;
            if (navigator.vibrate) navigator.vibrate([50, 50, 50]); // ブルブルっとエラー振動

            setTimeout(() => {
                messageText.style.color = '#ffffff';
                if (currentState === 'REGISTER_1') {
                    messageText.innerText = "新しいパスコードを入力";
                } else if (currentState === 'REGISTER_2') {
                    messageText.innerText = "確認のためもう一度入力";
                } else if (currentState === 'LOCKED') {
                    messageText.innerText = "パスコードを入力して解除";
                }
            }, 1500);
        }

        // 完全に最初からリセット
        function resetAll() {
            currentState = 'REGISTER_1';
            currentInput = '';
            firstInputPassword = '';
            savedPassword = '';
            statusText.innerText = "STEP 1: 登録";
            messageText.style.color = '#ffffff';
            messageText.innerText = "新しいパスコードを入力";
            updateDots();
        }
    </script>
</body>
</html>
