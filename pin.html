<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>スマホ風 パスコードロック</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #status {
            font-size: 0.8rem;
            color: #888888;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        #message {
            font-size: 1.2rem;
            margin-bottom: 15px;
            height: 24px;
            text-align: center;
        }

        #timer-display {
            font-size: 1rem;
            color: #00ff66;
            font-family: monospace;
            margin-bottom: 30px;
            height: 20px;
        }

        /* 入力中のドット表示 */
        .dots-container {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
            height: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            transition: background-color 0.1s ease;
        }

        .dot.filled {
            background-color: #ffffff;
        }

        /* キーパッド */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px 25px;
            width: 280px;
            transition: opacity 0.2s;
        }

        /* ロック中（入力禁止時）のスタイル */
        .keypad.locked {
            opacity: 0.3;
            pointer-events: none; /* タップを完全に無効化 */
        }

        .key {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #1c1c1e;
            color: #ffffff;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.1s;
        }

        .key:active {
            background-color: #3a3a3c;
        }

        /* 特殊ボタン（文字や機能） */
        .key.text-key {
            background-color: transparent;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .key.text-key:active {
            background-color: transparent;
            opacity: 0.5;
        }

        /* コントロールボタン群 */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            background: #1c1c1e;
            color: white;
            transition: background 0.2s;
        }

        button:disabled {
            background: #111;
            color: #444;
            cursor: not-allowed;
            border: 1px solid #222;
        }

        button.action-btn {
            background: #007bff;
            color: white;
        }

        button.restart-btn {
            background: #2e2a14;
            color: #ffd54f;
            border: 1px solid #ffd54f;
        }

        .back-btn {
            display: inline-block;
            margin-top: 25px;
            color: #888;
            font-size: 14px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div id="status">パスコード登録ステップ</div>
    <div id="message">新しいパスコードを入力 (0/5)</div>
    <div id="timer-display">タイム: 0.00 秒</div>

    <div class="dots-container">
        <div class="dot" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
        <div class="dot" id="dot4"></div>
    </div>

    <div class="keypad" id="keypad">
        <div class="key" onclick="pressKey('1')">1</div>
        <div class="key" onclick="pressKey('2')">2</div>
        <div class="key" onclick="pressKey('3')">3</div>
        <div class="key" onclick="pressKey('4')">4</div>
        <div class="key" onclick="pressKey('5')">5</div>
        <div class="key" onclick="pressKey('6')">6</div>
        <div class="key" onclick="pressKey('7')">7</div>
        <div class="key" onclick="pressKey('8')">8</div>
        <div class="key" onclick="pressKey('9')">9</div>
        <div class="key text-key" id="left-key"></div> 
        <div class="key" onclick="pressKey('0')">0</div>
        <div class="key text-key" onclick="pressDelete()">削除</div>
    </div>

    <div class="controls">
        <button id="keepRestartBtn" class="restart-btn" onclick="restartInputOnly()">リスタート</button>
        <button id="actionBtn" class="action-btn" onclick="switchMode()" disabled>認証モードへ移行</button>
    </div>

    <div>
        <a href="index.html" class="back-btn">メニューに戻る</a>
    </div>

    <script>
        const statusText = document.getElementById('status');
        const messageText = document.getElementById('message');
        const timerDisplay = document.getElementById('timer-display');
        const keypad = document.getElementById('keypad');
        const actionBtn = document.getElementById('actionBtn');
        
        let isAuthMode = false;
        let systemLocked = false;
        let currentInput = '';
        let savedPassword = '';

        // タイマー用変数
        let startTime = null;
        let timerInterval = null;
        let isTiming = false;

        const MAX_LENGTH = 5; // 桁数

        // タイマー制御用関数
        function startTimer() {
            isTiming = true;
            startTime = performance.now();
            timerInterval = setInterval(() => {
                const elapsedTime = (performance.now() - startTime) / 1000;
                timerDisplay.innerHTML = `タイム: ${elapsedTime.toFixed(2)} 秒`;
            }, 50);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            isTiming = false;
        }

        function resetTimerDisplay() {
            stopTimer();
            timerDisplay.innerHTML = "タイム: 0.00 秒";
            timerDisplay.style.color = "#00ff66";
        }

        // 数字が押されたとき
        function pressKey(num) {
            if (currentInput.length >= MAX_LENGTH || keypad.classList.contains('locked') || systemLocked) return;
            if (messageText.style.color === 'rgb(244, 67, 54)') return; 
            
            // 最初の1文字目が押されたらタイマーをスタート
            if (!isTiming && currentInput.length === 0) {
                startTimer();
                timerDisplay.style.color = "#00ff66";
            }

            currentInput += num;
            updateDots();
            
            if (!isAuthMode) {
                messageText.innerText = `新しいパスコードを入力 (${currentInput.length}/${MAX_LENGTH})`;
            }

            if (navigator.vibrate) navigator.vibrate(15); 

            // 規定桁数が入力されたら判定へ
            if (currentInput.length === MAX_LENGTH) {
                stopTimer();
                // 最後のドットの塗りつぶしを見せるためにディレイ
                setTimeout(handleInputComplete, 200);
            }
        }

        // 「削除」が押されたとき
        function pressDelete() {
            if (keypad.classList.contains('locked') || systemLocked) return;
            if (messageText.style.color === 'rgb(244, 67, 54)') return; 
            
            if (currentInput.length > 0) {
                currentInput = currentInput.slice(0, -1);
                updateDots();
                
                if (!isAuthMode) {
                    messageText.innerText = currentInput.length > 0 ? `新しいパスコードを入力 (${currentInput.length}/${MAX_LENGTH})` : `新しいパスコードを入力 (0/5)`;
                }

                if (currentInput.length === 0) {
                    resetTimerDisplay();
                }
            }
        }

        // 画面の丸（ドット）の表示を更新
        function updateDots() {
            for (let i = 0; i < MAX_LENGTH; i++) {
                const dot = document.getElementById(`dot${i}`);
                if (i < currentInput.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            }
        }

        // 入力完了時の処理
        function handleInputComplete() {
            const finalTime = ((performance.now() - startTime) / 1000).toFixed(2);

            if (!isAuthMode) {
                // 【登録モード】での入力完了
                savedPassword = currentInput;
                keypad.classList.add('locked'); // キーパッドをロック
                
                timerDisplay.innerHTML = `登録タイム: ${finalTime} 秒`;
                messageText.innerHTML = `パスコード登録完了！「認証モードへ移行」を押してください。`;
                actionBtn.disabled = false;
                
            } else {
                // 【認証モード】での入力完了
                keypad.classList.add('locked'); // 成功・失敗問わず一律キーパッドを即時ロック

                if (currentInput === savedPassword) {
                    systemLocked = true; // 解除成功状態でシステムロック（リスタートでも戻らない）
                    statusText.innerText = "認証成功 / ACCESS GRANTED";
                    statusText.style.color = "#4caf50";
                    messageText.style.color = '#4caf50';
                    messageText.innerText = "パスコード一致！";
                    
                    timerDisplay.innerHTML = `突破タイム: ${finalTime} 秒！`;
                    timerDisplay.style.color = '#4caf50';
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
                } else {
                    statusText.innerText = "認証失敗 / ACCESS DENIED";
                    statusText.style.color = "#f44336";
                    messageText.style.color = '#f44336';
                    messageText.innerText = "コードが違います。リスタートしてください";
                    
                    timerDisplay.innerHTML = `失敗タイム: ${finalTime} 秒`;
                    timerDisplay.style.color = '#f44336';
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                }
            }
            currentInput = '';
        }

        // リスタートボタン（リスタートを押すまでタイマーと入力ロックが維持される）
        function restartInputOnly() {
            if (systemLocked) return; // 完全に突破した後はリスタート無効

            keypad.classList.remove('locked'); // キーパッドのロック解除
            currentInput = '';
            updateDots();
            resetTimerDisplay();

            if (isAuthMode) {
                statusText.innerText = "パスコード認証モード実行中";
                statusText.style.color = "#ffca28";
                messageText.style.color = "#ffffff";
                messageText.innerText = "登録データを維持してリスタートしました。";
            } else {
                savedPassword = '';
                statusText.innerText = "パスコード登録ステップ";
                statusText.style.color = "#888888";
                messageText.style.color = "#ffffff";
                messageText.innerText = "新しいパスコードを入力 (0/5)";
                actionBtn.disabled = true;
                actionBtn.innerText = "認証モードへ移行";
            }
            if (navigator.vibrate) navigator.vibrate(100);
        }

        // モード切り替えボタン
        function switchMode() {
            resetTimerDisplay();
            keypad.classList.remove('locked');
            currentInput = '';
            updateDots();

            if (!isAuthMode) {
                isAuthMode = true;
                statusText.innerText = "パスコード認証モード実行中";
                statusText.style.color = "#ffca28";
                messageText.style.color = "#ffffff";
                messageText.innerText = "登録したパスコードを入力して解除してください";
                actionBtn.innerText = "登録からやり直す";
            } else {
                isAuthMode = false;
                systemLocked = false;
                savedPassword = '';
                statusText.innerText = "パスコード登録ステップ";
                statusText.style.color = "#888888";
                messageText.style.color = "#ffffff";
                messageText.innerText = "新しいパスコードを入力 (0/5)";
                actionBtn.innerText = "認証モードへ移行";
                actionBtn.disabled = true;
            }
        }
    </script>
</body>
</html>
