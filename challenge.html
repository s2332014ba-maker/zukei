<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI一筆書き・PIN認証システム</title>
    <style>
        body {
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d0d12;
            color: #ffffff;
            margin: 0;
            padding: 20px 10px;
            min-height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: none; /* スマホのスクロールやピンチズームを完全に禁止 */
        }
        
        /* メニューとデバッグ情報をまとめて上に引き上げるためのコンテナ */
        .bottom-group-container {
            position: relative;
            top: -25px;             
            margin-bottom: -25px;   
        }

        /* デバッグ・ラベル一覧情報のスタイル */
        #debug-info {
            font-size: 11px;
            color: #bbb;
            background: #111;
            padding: 8px;
            display: inline-block;
            border-radius: 6px;
            max-width: 90%;
            word-break: break-all;
            margin-top: 15px;       
            border: 1px solid #222;
        }

        #system-status {
            font-size: 20px;
            color: #00e5ff;
            font-weight: bold;
            margin: 10px 0;
            height: 35px;
        }
        #result-display {
            font-size: 15px;
            color: #aaa;
            margin: 5px 0 15px 0;
            height: 40px;
            padding: 0 10px;
        }
        #pin-preview {
            font-size: 13px;
            color: #ffca28;
            background: #1e1e24;
            padding: 8px;
            border-radius: 6px;
            margin: 10px auto;
            max-width: 90%;
            border: 1px solid #3a3a4a;
            min-height: 18px;
        }
        #timer-display {
            font-size: 16px;
            color: #00ff66;
            font-family: monospace;
            margin: 5px 0;
            height: 20px;
        }
        #canvas-container {
            margin: 15px auto;
            width: 250px;
            height: 250px;
        }
        canvas {
            border: 2px solid #333;
            background: #ffffff;
            cursor: crosshair;
            box-shadow: 0 4px 25px rgba(0, 229, 255, 0.15);
            border-radius: 16px;
            display: block;
        }
        
        /* ★描画禁止中のキャンバスの見た目を少し暗く（無効化っぽく）する演出 */
        canvas.locked {
            background: #e0e0e0 !important;
            border-color: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .controls {
            margin: 15px 0;
        }
        button {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #007bff;
            color: white;
            margin: 5px;
            transition: background 0.2s;
        }
        button:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
            border: 1px solid #333;
        }
        button.verify-btn {
            background: #454552;
            color: #ffca28;
            border: 1px solid #ffca28;
        }
        button.restart-btn {
            background: #2e2a14;
            color: #ffd54f;
            border: 1px solid #ffd54f;
        }
        
        /* ラベルの記号を等幅・等サイズにするスタイル */
        .label-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: #1a1a24;
            border-radius: 6px;
            margin: 0 3px;
            border: 1px solid #333;
            vertical-align: middle;
        }
        /* SVGアイコン自体のサイズを18pxに強制統一 */
        .label-badge svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #00e5ff;
            stroke-width: 2.2; 
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        /* メニューに戻るボタンのスタイル */
        .back-btn {
            display: inline-block;
            margin-top: 25px;
            color: #888888;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-btn:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="system-status"> システム起動中... </div>
    <div id="result-display">AIモデルの読み込みを待っています。</div>
    
    <div id="pin-preview">登録されたPIN: (未登録)</div>
    <div id="timer-display">タイム: 0.00 秒</div>
    
    <div id="canvas-container">
        <canvas id="drawArea" width="224" height="224" style="width: 250px; height: 250px;"></canvas>
    </div>

    <div class="controls">
        <button id="viewBtn" class="verify-btn" onclick="togglePINVisibility()" disabled> 登録PINを確認</button>
        <button id="keepRestartBtn" class="restart-btn" onclick="restartInputOnly()">リスタート</button>
        <button id="actionBtn" onclick="switchMode()" disabled>認証モードへ移行</button>
    </div>

    <div class="bottom-group-container">
        <div>
            <a href="index.html" class="back-btn">メニューに戻る</a>
        </div>
        <div id="debug-info">準備中...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/INFEA24FA/";
        let model, labels = [];
        
        let savedPIN = [];           
        let inputCount = 0;          
        let isAuthMode = false;      
        let systemLocked = false;     
        let isPINVisible = false;    
        let hasFailedTransition = false; 

        // --- タイマー用変数 ---
        let startTime = null;
        let timerInterval = null;
        let isTiming = false;

        const canvas = document.getElementById('drawArea');
        const ctx = canvas.getContext('2d');
        const statusDisplay = document.getElementById('system-status');
        const resultDisplay = document.getElementById('result-display');
        const pinPreview = document.getElementById('pin-preview');
        const timerDisplay = document.getElementById('timer-display');
        const debugInfo = document.getElementById('debug-info');

        // AIモデルの出す文字に対応する【完全等幅・美麗SVG】図形データ
        const svgIcons = {
            "〇": `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7.5"/></svg>`,
            "△": `<svg viewBox="0 0 24 24"><polygon points="12,4.5 4,19.5 20,19.5"/></svg>`,
            "□": `<svg viewBox="0 0 24 24"><rect x="4.5" y="4.5" width="15" height="15" rx="1"/></svg>`,
            "⛥": `<svg viewBox="0 0 24 24"><path d="M12,3.5 L17.85,21.5 L3.34,10.38 L20.66,10.38 L6.15,21.5 Z"/></svg>`,
            "∞": `<svg viewBox="0 0 24 24"><path d="M12,12 C14,10 15.2,7.2 17.2,7.2 A4.8,4.8 0 1,1 17.2,16.8 C15.2,16.8 14,14 12,12 C10,14 8.8,16.8 6.8,16.8 A4.8,4.8 0 1,1 6.8,7.2 C8.8,7.2 10,10 12,12 Z"/></svg>`
        };

        // --- 1. 初期化 ---
        async function initAI() {
            try {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                labels = model.getClassLabels();
                
                statusDisplay.innerHTML = " PINコード登録ステップ ";
                resultDisplay.innerHTML = "一筆書きで図形を描いてね。離すと自動で登録されます (0/4)";
                updatePINDisplay();
                resetTimerDisplay();
                
                const formattedLabels = labels.map(label => {
                    const icon = svgIcons[label] || label;
                    return `<span class="label-badge">${icon}</span>`;
                }).join("");
                
                debugInfo.innerHTML = "対応モデルラベル: " + formattedLabels;
                clearCanvas();
            } catch (e) {
                statusDisplay.innerHTML = "❌ エラー: ロード失敗";
            }
        }

        // --- 2. お絵描き設定 ---
        ctx.lineWidth = 8;          
        ctx.lineCap = 'round';       
        ctx.lineJoin = 'round';      
        ctx.shadowBlur = 1;          
        ctx.shadowColor = '#000000'; 
        ctx.strokeStyle = '#000000'; 
        let drawing = false;

        function getEventPos(e) {
            const MathRect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = (clientX - MathRect.left) * (canvas.width / MathRect.width);
            const y = (clientY - MathRect.top) * (canvas.height / MathRect.height);
            return { x, y };
        }

        function startDrawing(e) {
            // ★システムロック中、またはロッククラスが付与されているときは描かせない
            if (systemLocked || canvas.classList.contains('locked')) return;
            e.preventDefault();

            if (!isTiming) {
                startTimer();
            }

            drawing = true;
            ctx.beginPath();
            const pos = getEventPos(e);
            ctx.moveTo(pos.x, pos.y);
        }

        function moveDrawing(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getEventPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        async function endDrawing(e) {
            if (drawing) {
                e.preventDefault();
                drawing = false;
                
                await processStroke();
                
                // ★4つ目の登録時も含め、常にキャンバスをクリア。
                // 登録完了時や認証終了時（再描画禁止時）は見た目のみ変更 or そのままクリア
                clearCanvas();
            }
        }

        function clearCanvas() {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function startTimer() {
            isTiming = true;
            startTime = performance.now();
            timerInterval = setInterval(() => {
                const elapsedTime = (performance.now() - startTime) / 1000;
                timerDisplay.innerHTML = `タイム: ${elapsedTime.toFixed(2)} 秒`;
            }, 50);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            isTiming = false;
        }

        function resetTimerDisplay() {
            stopTimer();
            timerDisplay.innerHTML = "タイム: 0.00 秒";
            timerDisplay.style.color = "#00ff66";
        }

        function togglePINVisibility() {
            if (savedPIN.length === 0) return;
            isPINVisible = !isPINVisible; 
            
            const viewBtn = document.getElementById('viewBtn');
            if (isPINVisible) {
                viewBtn.innerText = "登録PINを隠す";
            } else {
                viewBtn.innerText = "登録PINを確認";
            }
            updatePINDisplay();
        }

        function updatePINDisplay() {
            if (savedPIN.length === 0) {
                pinPreview.innerHTML = "登録されたPIN: (未登録)";
                return;
            }

            let text = "登録されたPIN: ";
            savedPIN.forEach((val, index) => {
                if (isPINVisible) {
                    text += `[${val}] `;
                } else {
                    text += `[*] `;
                }
            });
            pinPreview.innerHTML = text;
        }

        function restartInputOnly() {
            canvas.classList.remove('locked'); // ★キャンバスのロック解除

            if (isAuthMode) {
                inputCount = 0;
                hasFailedTransition = false;
                systemLocked = false;

                resetTimerDisplay();

                statusDisplay.innerHTML = " PIN認証モード実行中 ";
                statusDisplay.style.color = "#ffca28";
                resultDisplay.innerHTML = "登録データを維持してリスタートしました。1回目から入力してください。 [進行度: _ _ _ _]";
                resultDisplay.style.color = "#aaa";
            } else {
                savedPIN = [];
                inputCount = 0;
                hasFailedTransition = false;
                isPINVisible = false;

                resetTimerDisplay();

                statusDisplay.innerHTML = " PINコード登録ステップ ";
                statusDisplay.style.color = "#00e5ff";
                resultDisplay.innerHTML = "一筆書きで図形を描いてね。離すと自動で登録されます (0/4)";
                resultDisplay.style.color = "#aaa";
                
                document.getElementById('viewBtn').innerText = "登録PINを確認";
                document.getElementById('viewBtn').disabled = true;
                document.getElementById('actionBtn').innerText = "認証モードへ移行";
                document.getElementById('actionBtn').disabled = true;
                
                updatePINDisplay();
            }
            
            clearCanvas();
            if (navigator.vibrate) navigator.vibrate(100);
        }

        async function processStroke() {
            if (!model) return;

            const prediction = await model.predict(canvas);
            let topClass = "";
            let topProb = 0;

            let debugText = "";
            prediction.forEach(p => {
                let probPercent = Math.round(p.probability * 100);
                debugText += `${p.className}: ${probPercent}% | `;
                if (p.probability > topProb) {
                    topProb = p.probability;
                    topClass = p.className;
                }
            });
            
            const formattedLabels = labels.map(label => {
                const icon = svgIcons[label] || label;
                return `<span class="label-badge">${icon}</span>`;
            }).join("");
            debugInfo.innerHTML = "対応モデルラベル: " + formattedLabels + "<br>" + debugText;

            let topClassPercent = Math.round(topProb * 100);

            if (!isAuthMode) {
                if (savedPIN.length < 4) {
                    savedPIN.push(topClass);
                    updatePINDisplay();
                    resultDisplay.innerHTML = `「${topClass}」(${topClassPercent}%) を登録しました (${savedPIN.length}/4)`;
                    if (navigator.vibrate) navigator.vibrate(50);

                    document.getElementById('viewBtn').disabled = false;

                    if (savedPIN.length === 4) {
                        stopTimer(); 
                        const finalTime = ((performance.now() - startTime) / 1000).toFixed(2);
                        timerDisplay.innerHTML = `登録タイム: ${finalTime} 秒`;

                        resultDisplay.innerHTML = `4つのPIN登録が完了！[最後: ${topClass}(${topClassPercent}%)] 「認証モードへ移行」を押してください。`;
                        document.getElementById('actionBtn').disabled = false;
                        
                        // ★4つの登録が終わった時はキャンバスをロック状態にする（endDrawingで白くクリアされます）
                        canvas.classList.add('locked');
                    }
                }
            } 
            else {
                const requiredClass = savedPIN[inputCount];
                const targetPredict = prediction.find(p => p.className === requiredClass);
                const targetProb = targetPredict ? targetPredict.probability : 0;
                const targetProbPercent = Math.round(targetProb * 100);

                if (targetProb < 0.85) {
                    hasFailedTransition = true;
                }

                inputCount++; 
                if (navigator.vibrate) navigator.vibrate(60);

                if (inputCount === 4) {
                    stopTimer(); 
                    const finalTime = ((performance.now() - startTime) / 1000).toFixed(2);

                    // ★認証終了時（4回描き終わった時点）で、成功・失敗問わず一律キャンバスを即時ロック
                    canvas.classList.add('locked');

                    if (!hasFailedTransition) {
                        systemLocked = true; 
                        statusDisplay.innerHTML = "認証成功 / ACCESS GRANTED";
                        statusDisplay.style.color = "#4caf50";
                        resultDisplay.innerHTML = `すべてのPINが一致！`;
                        resultDisplay.style.color = "#4caf50";
                        
                        timerDisplay.innerHTML = `突破タイム: ${finalTime} 秒`;
                        timerDisplay.style.color = "#4caf50";

                        if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
                    } else {
                        // 次の再挑戦のために一旦リセットはするが、描画は禁止（リスタートボタンを押すまで locked が維持されます）
                        inputCount = 0;
                        hasFailedTransition = false; 
                        
                        statusDisplay.innerHTML = "認証失敗 / ACCESS DENIED";
                        statusDisplay.style.color = "#f44336";
                        resultDisplay.innerHTML = `リスタートか登録からやり直してください`;
                        resultDisplay.style.color = "#f44336";
                        
                        timerDisplay.innerHTML = `失敗タイム: ${finalTime} 秒 `;
                        timerDisplay.style.color = "#f44336";

                        if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                        isTiming = false; 
                    }
                } else {
                    let progressDots = "* ".repeat(inputCount) + "_ ".repeat(4 - inputCount);
                    resultDisplay.innerHTML = `次の図形を描いてください。 [進行度: ${progressDots}]`;
                    resultDisplay.style.color = "#ffca28";
                }
            }
        }

        function switchMode() {
            resetTimerDisplay(); 
            canvas.classList.remove('locked'); // ★モード切り替え時はロックを解除

            if (!isAuthMode) {
                isAuthMode = true;
                inputCount = 0;
                hasFailedTransition = false;
                statusDisplay.innerHTML = " PIN認証モード実行中 ";
                statusDisplay.style.color = "#ffca28";
                resultDisplay.innerHTML = "登録した順番通りに、一筆書きで4回連続入力してください。 [進行度: _ _ _ _]";
                document.getElementById('actionBtn').innerText = "登録からやり直す";
            } else {
                isAuthMode = false;
                systemLocked = false;
                savedPIN = []; 
                inputCount = 0;
                hasFailedTransition = false;
                isPINVisible = false;
                statusDisplay.innerHTML = " PINコード登録ステップ ";
                statusDisplay.style.color = "#00e5ff";
                resultDisplay.innerHTML = "一筆書きで図形を描いてね。離すと自動で登録されます (0/4)";
                resultDisplay.style.color = "#aaa";
                document.getElementById('viewBtn').innerText = "登録PINを確認";
                document.getElementById('viewBtn').disabled = true;
                updatePINDisplay();
                document.getElementById('actionBtn').innerText = "認証モードへ移行";
                document.getElementById('actionBtn').disabled = true;
            }
            clearCanvas();
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', moveDrawing);
        window.addEventListener('mouseup', endDrawing);

        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', moveDrawing, { decline: false });
        window.addEventListener('touchend', endDrawing);

        initAI();
    </script>
</body>
</html>
